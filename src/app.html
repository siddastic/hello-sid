<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Set has-scroll synchronously, before paint, so [data-fadeup]
			// sections start hidden and IntersectionObserver reveals them
			// without a flash. Reduced-motion users skip the hide entirely.
			(function () {
				try {
					if (
						!window.matchMedia ||
						!window.matchMedia('(prefers-reduced-motion: reduce)').matches
					) {
						document.documentElement.classList.add('has-scroll');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
